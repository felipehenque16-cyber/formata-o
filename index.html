<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<div class="container">
    <div id="kit-preview">
        <div id="base-color" class="layer" style="background-color: #ffffff;"></div>
        <img src="https://i.imgur.com/5uY8f9G.png" class="shadow-layer" id="template-shadow" crossorigin="anonymous">
        <img id="logo-preview" class="layer" style="display:none; width: 80px; height: 80px; top: 30%; left: 60%;">
    </div>

    <div class="controls">
        <label>Cor da Camisa:</label>
        <input type="color" id="colorPicker" value="#ffffff">

        <label>Escudo (PNG):</label>
        <input type="file" id="logoUpload" accept="image/*">

        <button onclick="downloadKit()">Baixar Kit FC'12</button>
    </div>
</div>

<script>
    // Lógica de cores e upload (mesma de antes)
    const colorPicker = document.getElementById('colorPicker');
    const baseColor = document.getElementById('base-color');
    colorPicker.addEventListener('input', (e) => baseColor.style.backgroundColor = e.target.value);

    const logoUpload = document.getElementById('logoUpload');
    const logoPreview = document.getElementById('logo-preview');
    logoUpload.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            logoPreview.src = event.target.result;
            logoPreview.style.display = 'block';
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // --- FUNÇÃO DE DOWNLOAD REAL ---
    function downloadKit() {
        const preview = document.getElementById('kit-preview');
        
        html2canvas(preview, {
            useCORS: true, // Permite carregar imagens de outros domínios
            backgroundColor: null, // Mantém o fundo transparente se a div for transparente
            scale: 2 // Dobra a resolução para ficar nítido no FM
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'minikit_fc12.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
