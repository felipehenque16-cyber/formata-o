<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador Profissional FC'12</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --panel-bg: #222;
            --text-color: #eee;
            --button-color: #28a745;
        }

        body {
            background-color: #111;
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            text-align: center;
            padding: 20px;
        }

        /* 1. O Container do Preview (Proporção 420x420 do FC'12) */
        .preview-area {
            position: relative;
            width: 420px;
            height: 420px;
            margin: 20px auto;
            border: 3px solid #444;
            /* Fundo de exemplo para ver a transparência */
            background: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            overflow: hidden;
            border-radius: 8px;
        }

        /* 2. Camada 1: A Cor Base (Com Máscara de Recorte) */
        #camada-cor {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            
            /* --- IMPORTANTE: SUA AÇÃO É AQUI! --- */
            /* Link para o PNG da Máscara de Corpo do Template FC'12 (Preto sólido no formato da camisa) */
            -webkit-mask-image: url('INSIRA_AQUI_A_URL_DO_PNG_DA_MASCARA_DE_CORPO'); 
            mask-image: url('INSIRA_AQUI_A_URL_DO_PNG_DA_MASCARA_DE_CORPO');
            
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: center; mask-position: center;
        }

        /* 3. Camada 2: Sombras e Dobras (Essencial para o FC'12) */
        #camada-sombra {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            
            /* --- IMPORTANTE: SUA AÇÃO É AQUI! --- */
            /* Link para o PNG de Sombra do Template FC'12 */
            content: url('INSIRA_AQUI_A_URL_DO_PNG_DE_SOMBRA'); 

            mix-blend-mode: multiply; /* Faz a sombra se misturar com a cor */
            object-fit: contain;
        }

        /* 4. Camada 3: Escudo e Logos */
        #escudo-layer {
            position: absolute;
            z-index: 3;
            /* Posicionamento padrão para o modelo FC'12 */
            width: 80px; /* Tamanho do escudo */
            top: 28%; /* Alinhamento vertical */
            right: 25%; /* Alinhamento horizontal (ao lado do peito) */
        }

        .controls {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        input, button { margin: 10px; padding: 12px; border-radius: 6px; border: none; font-size: 16px; }
        button { background-color: var(--button-color); color: white; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <h2>Configurador de Kit Profissional FC'12</h2>

    <div id="fc12-canvas" class="preview-area">
        <div id="camada-cor" style="background-color: #ff0000;"></div>
        <img id="camada-sombra" crossorigin="anonymous">
        <img id="escudo-layer" src="" style="display:none;" crossorigin="anonymous">
    </div>

    <div class="controls">
        <label>Cor Principal:</label>
        <input type="color" id="picker-cor" value="#ff0000"><br>
        
        <label>Escudo (PNG Transparente):</label>
        <input type="file" id="picker-escudo" accept="image/*"><br>
        
        <button onclick="downloadKitFinal()">BAIXAR KIT PRONTO (.PNG)</button>
    </div>

    <script>
        const pickerCor = document.getElementById('picker-cor');
        const camadaCor = document.getElementById('camada-cor');
        const pickerEscudo = document.getElementById('picker-escudo');
        const escudoLayer = document.getElementById('escudo-layer');

        // Lógica de Cor
        pickerCor.addEventListener('input', (e) => camadaCor.style.backgroundColor = e.target.value);

        // Lógica de Escudo (Lê o arquivo enviado e mostra na camisa)
        pickerEscudo.addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                escudoLayer.src = event.target.result;
                escudoLayer.style.display = 'block';
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // Função de Download
        function downloadKitFinal() {
            const area = document.getElementById('fc12-canvas');
            
            // html2canvas tira uma "foto" da sua div, respeitando as camadas e misturas
            html2canvas(area, {
                useCORS: true, // Importante para imagens externas
                backgroundColor: null, // Mantém o fundo transparente
                scale: 1 // Resolução original
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'kit_fc12_gerado.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
